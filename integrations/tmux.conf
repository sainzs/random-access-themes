# Minimal tmux — Amnesiac / luxury minimal
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:RGB"
set -sg escape-time 10
set -g history-limit 100000
set -g mouse on
set -g focus-events on
set -g set-titles on
set -g set-titles-string "#W"
set -g automatic-rename on
set -g automatic-rename-format '#{?pane_in_mode,copy,#{?#{==:#{pane_current_command},zsh},#{b:pane_current_path},#{pane_current_command}}}'

bind | split-window -h -c '#{pane_current_path}'
bind - split-window -v -c '#{pane_current_path}'
bind c new-window -c '#{pane_current_path}'

set -g status-position bottom
set -g status-interval 5
set -g status-justify left
set -g status-style 'bg=#000000,fg=#817771'
set -g status-left-length 12
set -g status-right-length 48
set -g status-left '#[fg=#00c490]#S '
set -g status-right '#[fg=#817771]#{b:pane_current_path} #[fg=#b1a8a2]· #[fg=#817771]%H:%M '

set -g window-status-format '#[fg=#625a56]#I #[fg=#817771]#W '
set -g window-status-current-format '#[fg=#00c490]#I #[fg=#f2efec]#W '
set -g window-status-separator ' '

set -g pane-border-style 'fg=#141210'
set -g pane-active-border-style 'fg=#1a1715'
set -g message-style 'bg=#141210,fg=#f2efec'
set -g message-command-style 'bg=#141210,fg=#b1a8a2'
set -g mode-style 'bg=#141210,fg=#f2efec'

setw -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel
