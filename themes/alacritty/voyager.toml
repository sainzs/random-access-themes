yellow   = "#ddf4f2"
blue     = "#22b8ab"
magenta  = "#1a9e91"
cyan     = "#a8ddd9"
white    = "#f2efec"

[colors.bright]
black    = "#817771"
red      = "#22b8ab"
green    = "#7dd4cc"
yellow   = "#c5ebe8"
blue     = "#2ccfc0"
