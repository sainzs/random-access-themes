# Random Access Theme — Ghostty
# Warm-black dark palette. Electric mint accent. Named after Daft Punk's Veridis Quo.
# https://github.com/sainzs/random-access-themes

background = 000000
foreground = f2efec

cursor-color = 00ffb2
cursor-text  = 000000
cursor-style       = block
cursor-style-blink = true

selection-background = 2a2623
selection-foreground = f2efec

minimum-contrast = 1.2

# ANSI 16-color palette
palette = 0=#0f0e0d
