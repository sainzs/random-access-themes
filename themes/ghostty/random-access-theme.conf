# Random Access Theme — Ghostty
# OLED-black dark palette. Mint-forward, green-family syntax, minimal noise.
# https://github.com/sainzs/random-access-themes

background = 000000
foreground = d8efe9

cursor-color = 00ffb2
cursor-text  = 000000
cursor-style       = block
cursor-style-blink = true

selection-background = 1a1c20
selection-foreground = d8efe9

minimum-contrast = 1.2

# ANSI 16-color palette
palette = 0=#090a0b
palette = 1=#26c994
palette = 2=#4ade80
palette = 3=#a2e5b8
palette = 4=#00ffb2
palette = 5=#35d5c5
palette = 6=#66e3c4
palette = 7=#d8efe9
palette = 8=#6f8d86
palette = 9=#00ffb2
palette = 10=#4ade80
palette = 11=#8bf5dd
palette = 12=#00ffb2
palette = 13=#35d5c5
palette = 14=#66e3c4
palette = 15=#d8efe9
