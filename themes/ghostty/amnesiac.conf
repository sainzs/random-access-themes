# Random Access Theme — Ghostty
# Warm-black dark palette. Indigo accent. Named after Radiohead's Amnesiac.
# https://github.com/ssainz/random-access-themes

background = 000000
foreground = f2efec

cursor-color = 7b93ff
cursor-text  = 000000
cursor-style       = block
cursor-style-blink = true

selection-background = 2a2623
selection-foreground = f2efec

minimum-contrast = 1.2

# ANSI 16-color palette
palette = 0=#0f0e0d
palette = 1=#4d5ec8
palette = 2=#9baaf2
palette = 3=#dce2ff
palette = 4=#6b7ef5
palette = 5=#5c70d8
palette = 6=#b4bef0
palette = 7=#f2efec
palette = 8=#817771
palette = 9=#6b7ef5
palette = 10=#9baaf2
palette = 11=#c8d2ff
palette = 12=#7b93ff
palette = 13=#5c70d8
palette = 14=#b4bef0
palette = 15=#f2efec
