# Random Access Theme — WezTerm color scheme
# Warm-black dark palette. Vibrant electric teal accent. Named after Daft Punk's Voyager.
# https://github.com/ssainz/random-access-themes
#
# Place in ~/.config/wezterm/colors/
# Then set: config.color_scheme = "Voyager"

[colors]
foreground    = "#f2efec"
background    = "#000000"
cursor_bg     = "#2ccfc0"
cursor_border = "#2ccfc0"
cursor_fg     = "#000000"
selection_bg  = "#2a2623"
selection_fg  = "#f2efec"
ansi          = ["#0f0e0d", "#0f7a6e", "#7dd4cc", "#ddf4f2", "#22b8ab", "#1a9e91", "#a8ddd9", "#f2efec"]
brights       = ["#817771", "#22b8ab", "#7dd4cc", "#c5ebe8", "#2ccfc0", "#1a9e91", "#a8ddd9", "#f2efec"]

[metadata]
name       = "Voyager"
origin_url = "https://github.com/ssainz/random-access-themes"
