# Random Access Theme — WezTerm color scheme
# Warm-black dark palette. Indigo accent. Named after Radiohead's Amnesiac.
# https://github.com/ssainz/random-access-themes
#
# Place in ~/.config/wezterm/colors/
# Then set: config.color_scheme = "Amnesiac"

[colors]
foreground    = "#f2efec"
background    = "#000000"
cursor_bg     = "#7b93ff"
cursor_border = "#7b93ff"
cursor_fg     = "#000000"
selection_bg  = "#2a2623"
selection_fg  = "#f2efec"
ansi          = ["#0f0e0d", "#4d5ec8", "#9baaf2", "#dce2ff", "#6b7ef5", "#5c70d8", "#b4bef0", "#f2efec"]
brights       = ["#817771", "#6b7ef5", "#9baaf2", "#c8d2ff", "#7b93ff", "#5c70d8", "#b4bef0", "#f2efec"]

[metadata]
name       = "Amnesiac"
origin_url = "https://github.com/ssainz/random-access-themes"
